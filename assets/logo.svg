<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Garmin MCP connector logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3d91"/>
      <stop offset="1" stop-color="#1e88e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Activity ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="28"/>
  <path d="M256 106 a150 150 0 1 1 -106 44" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
  <!-- Heartbeat trace -->
  <path d="M150 262 h52 l22 -52 l34 104 l24 -66 h56"
        fill="none" stroke="#ffffff" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
